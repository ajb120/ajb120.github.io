
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICA 11</title>
    <link rel="stylesheet" href="ica11.css">
</head>
<body>

    <header>
        <h1>Amelia's Story Generator</h1>
        <p>Every story is different. Some are worse than others.</p>
    </header>

    <main>
        <div class="controls">
            <div class="input-group">
                <input id="custom-name" type="text" placeholder="name" />
            </div>

            <fieldset>
                <legend>Choose units:</legend>
                <label for="us">
                    <input id="us" type="radio" name="uk-us" value="us" checked />
                    US
                </label>
                <label for="uk">
                    <input id="uk" type="radio" name="uk-us" value="uk" />
                    UK
                </label>
            </fieldset>

            <button class="generate">Generate random story</button>
        </div>

        <p class="story"></p>
    </main>

    <script>
        const customName = document.getElementById("custom-name");
        const generateBtn = document.querySelector(".generate");
        const story = document.querySelector(".story");

        function randomValueFromArray(array) {
            const random = Math.floor(Math.random() * array.length);
            return array[random];
        }

        const characters = ["Papa Smurf", "a rogue Surfside", "Ralphie"];
        const places = ["the Flatirons", "Folsom Field", "the Naples, FL Whole Foods"];
        const events = [
            "attempted a backflip and immediately regretted it",
            "declared itself a sovereign nation and refused to leave",
            "filed a formal complaint with the FAA"
        ];

        function returnRandomStoryString() {
            const randomCharacter = randomValueFromArray(characters);
            const randomPlace = randomValueFromArray(places);
            const randomEvent = randomValueFromArray(events);

            let storyText = `It was 94 Fahrenheit in Boulder, so ${randomCharacter} decided to take the day off. 
            After somehow ending up at ${randomPlace}, it stared into the middle distance for a few moments, 
            then ${randomEvent}. Bob witnessed the whole thing but was completely unbothered — 
            ${randomCharacter} weighs 300 pounds and had an 8am practice the next morning anyway.`;

            return storyText;
        }

        generateBtn.addEventListener("click", generateStory);

        function generateStory() {
            let newStory = returnRandomStoryString();

            if (customName.value !== "") {
                const name = customName.value;
                newStory = newStory.replaceAll("Bob", name);
            }

            if (document.getElementById("uk").checked) {
                const weight = `${Math.round(300 / 14)} stone`;
                const temperature = `${Math.round((94 - 32) * (5 / 9))} Celsius`;
                newStory = newStory.replace("300 pounds", weight);
                newStory = newStory.replace("94 Fahrenheit", temperature);
            }

            story.textContent = newStory;
            story.style.visibility = "visible";
        }
    </script>

</body>
</html>
